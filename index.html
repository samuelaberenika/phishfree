<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishFree - Can You Spot the Threat?</title>
  <meta name="description" content="Train your instincts to identify phishing emails. Interactive cybersecurity awareness game.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!--  SPLASH SCREEN  -->
    <section id="screen-landing" class="screen active" aria-label="Landing">
      <div class="screen-inner">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-bracket">[</span>
            <span class="brand-symbol">!</span>
            <span class="brand-bracket">]</span>
          </div>
          <h1 class="brand-name">PhishFree</h1>
          <p class="brand-tagline">Train your instincts. Spot the threat.</p>
        </div>
        <a href="landing.html" class="btn btn-primary btn-lg">Start Training</a>
        <p id="landing-high-score" class="high-score-display" aria-live="polite"></p>
      </div>
    </section>

  </div><!-- /#app -->

  <script src="game.js"></script>
  <script>
    /*  Show best score on splash if one exists  */
    const el = document.getElementById('landing-high-score');
    try {
      const raw = localStorage.getItem('phishfree_highscore');
      const hs  = parseInt(raw, 10);
      if (!isNaN(hs) && hs > 0) el.textContent = 'Best score: ' + hs;
    } catch {}
  </script>
</body>
</html>
